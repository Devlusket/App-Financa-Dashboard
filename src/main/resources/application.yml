spring:
  application:
    name: financa
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/financa}
    username: ${DATABASE_USERNAME:financa}
    password: ${DATABASE_PASSWORD:financa}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:troque-esta-chave-jwt-em-producao-por-uma-com-32-bytes}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
